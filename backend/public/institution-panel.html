<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Kurum Paneli</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid var(--gray-l); }
    .tab-btn {
      padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; cursor: pointer; font-size: .95em; color: var(--gray); font-family: inherit;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 600; }
    .tab-btn:hover { color: var(--teal-d); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .user-table { width: 100%; border-collapse: collapse; font-size: .9em; }
    .user-table th, .user-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--gray-l); }
    .user-table th { background: var(--gray-bg); color: var(--navy); font-weight: 600; }
    .user-table tr:hover { background: #f9fafb; }

    .toggle-btn {
      padding: 4px 14px; border-radius: 20px; border: none; cursor: pointer;
      font-size: .85em; font-weight: 600; transition: background .2s;
    }
    .toggle-on { background: var(--success); color: var(--white); }
    .toggle-off { background: var(--gray-l); color: var(--gray); }
    .toggle-btn:hover { opacity: .85; }

    .info-grid { display: grid; grid-template-columns: 140px 1fr; gap: 8px 16px; font-size: .95em; }
    .info-label { color: var(--gray); font-weight: 600; }
    .info-value { color: var(--black); }

    .verify-box {
      background: #fef3c7; border: 1px solid #f59e0b; border-radius: var(--radius);
      padding: 20px; text-align: center; color: #92400e;
    }
    .verify-box p { margin-bottom: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <div class="card card-wide">
      <div id="verifySection" style="display:none">
        <h2>Kurum Doğrulama Gerekli</h2>
        <div class="verify-box">
          <p>Kurumunuz henüz doğrulanmamış.</p>
          <p>Kurumunuzu aktif etmek için kurumunuzun resmi web sitesinden aşağıdaki adrese e-posta gönderiniz:</p>
          <p style="font-size:1.1em;font-weight:700;color:#0d1b2a" id="emailTo"></p>
          <p style="font-size:.85em;margin-top:8px">E-postada kurum kodunuzu belirtmeyi unutmayın.</p>
        </div>
        <div style="text-align:center;margin-top:16px">
          <button class="btn btn-outline" onclick="instLogout()">Çıkış Yap</button>
        </div>
      </div>

      <div id="panelSection" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="margin:0" id="instName"></h2>
          <button class="btn btn-outline" onclick="instLogout()" style="font-size:.85em">Çıkış Yap</button>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="users">Kullanıcılar</button>
          <button class="tab-btn" data-tab="info">Kurum Bilgileri</button>
        </div>

        <div id="tab-users" class="tab-content active">
          <div id="usersLoading" class="msg msg-info">Yükleniyor...</div>
          <div class="responsive-table">
            <table class="user-table m-card-table" id="usersTable" style="display:none">
              <thead>
                <tr><th>E-posta</th><th>Telefon</th><th>Kilit Açma</th><th>Kayıt Tarihi</th></tr>
              </thead>
              <tbody id="usersBody"></tbody>
            </table>
          </div>
          <div id="noUsers" class="msg msg-info" style="display:none">Henüz kayıtlı kullanıcı yok.</div>
        </div>

        <div id="tab-info" class="tab-content">
          <div class="info-grid" id="infoGrid"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;
    const token = sessionStorage.getItem('instToken');

    if (!token) location.href = 'institution-login.html';

    const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

    function instLogout() {
      sessionStorage.removeItem('instToken');
      sessionStorage.removeItem('institution');
      location.href = 'institution-login.html';
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    async function loadPanel() {
      try {
        const res = await fetch(`${API_URL}/institution/profile`, { headers });
        if (res.status === 401) { instLogout(); return; }
        const inst = await res.json();

        if (!inst.is_verified) {
          document.getElementById('verifySection').style.display = 'block';
          document.getElementById('emailTo').textContent = '${location.hostname}' ? '' : '';
          // EMAIL_TO backend'den alınacak
          fetchEmailTo();
          return;
        }

        document.getElementById('panelSection').style.display = 'block';
        document.getElementById('instName').textContent = inst.name;

        // Kurum bilgileri
        const infoGrid = document.getElementById('infoGrid');
        const fields = [
          ['Kurum Adı', inst.name],
          ['Kurum Kodu', inst.institution_code],
          ['Yetkili', inst.responsible_name],
          ['Telefon', inst.phone],
          ['E-posta', inst.email || '-'],
          ['İl', inst.il_adi || '-'],
          ['İlçe', inst.ilce_adi || '-'],
          ['Tür', inst.tip || '-']
        ];
        infoGrid.innerHTML = fields.map(([l, v]) =>
          `<span class="info-label">${l}</span><span class="info-value">${v}</span>`
        ).join('');

        loadUsers();
      } catch {
        document.querySelector('.card').innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
    }

    async function fetchEmailTo() {
      try {
        const res = await fetch(`${API_URL}/institution/email-to`, { headers });
        const data = await res.json();
        document.getElementById('emailTo').textContent = data.emailTo || '-';
      } catch { /* ignore */ }
    }

    async function loadUsers() {
      const loading = document.getElementById('usersLoading');
      const table = document.getElementById('usersTable');
      const noUsers = document.getElementById('noUsers');
      const tbody = document.getElementById('usersBody');

      try {
        const res = await fetch(`${API_URL}/institution/users`, { headers });
        const users = await res.json();
        loading.style.display = 'none';

        if (!users.length) { noUsers.style.display = 'block'; return; }

        table.style.display = 'table';
        tbody.innerHTML = users.map(u => `
          <tr>
            <td data-label="E-posta">${u.email}</td>
            <td data-label="Telefon">${u.phone}</td>
            <td data-label="Kilit Açma">
              <button class="toggle-btn ${u.has_unlock_permission ? 'toggle-on' : 'toggle-off'}"
                      onclick="togglePermission(${u.id}, this)">
                ${u.has_unlock_permission ? 'Açık' : 'Kapalı'}
              </button>
            </td>
            <td data-label="Kayıt Tarihi">${new Date(u.created_at).toLocaleDateString('tr-TR')}</td>
          </tr>
        `).join('');
      } catch {
        loading.innerHTML = '<div class="msg msg-error">Kullanıcılar yüklenemedi</div>';
      }
    }

    async function togglePermission(userId, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`${API_URL}/institution/users/${userId}/permission`, {
          method: 'PUT', headers
        });
        const data = await res.json();
        if (res.ok) {
          btn.className = 'toggle-btn ' + (data.has_unlock_permission ? 'toggle-on' : 'toggle-off');
          btn.textContent = data.has_unlock_permission ? 'Açık' : 'Kapalı';
        }
      } catch { /* ignore */ }
      btn.disabled = false;
    }

    loadPanel();
  </script>
</body>
</html>
