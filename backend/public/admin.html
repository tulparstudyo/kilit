<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulpar Kilit — Admin Paneli</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .admin-header h2 { margin: 0; }
    .search-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .search-row input, .search-row select { flex: 1; min-width: 150px; }
    .search-row button { white-space: nowrap; }

    .inst-table { width: 100%; border-collapse: collapse; font-size: .88em; }
    .inst-table th, .inst-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--gray-l); }
    .inst-table th { background: var(--gray-bg); color: var(--navy); font-weight: 600; position: sticky; top: 0; }
    .inst-table tr:hover { background: #f9fafb; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .8em; font-weight: 600; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }

    .action-btn { padding: 4px 12px; border-radius: var(--radius); border: none; cursor: pointer; font-size: .82em; font-weight: 600; transition: background .2s; }
    .btn-activate { background: var(--success); color: var(--white); }
    .btn-activate:hover { opacity: .85; }
    .btn-deactivate { background: var(--error); color: var(--white); }
    .btn-deactivate:hover { opacity: .85; }

    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 16px; }
    .pagination button { padding: 6px 14px; }
    .page-info { color: var(--gray); font-size: .9em; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--white); border-radius: var(--radius); padding: 28px 32px; width: 100%; max-width: 400px; box-shadow: var(--shadow); }
    .modal h3 { margin-bottom: 16px; color: var(--navy); }
    .modal form { display: flex; flex-direction: column; gap: 12px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

    .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: var(--white); border-radius: var(--radius); padding: 14px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; flex: 1; min-width: 120px; }
    .stat-card .num { font-size: 1.4em; font-weight: 700; color: var(--navy); }
    .stat-card .label { font-size: .82em; color: var(--gray); margin-top: 2px; }

    .table-wrap { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
  </style>
</head>
<body>
  <!-- Login -->
  <main id="loginSection">
    <div class="card">
      <h2>Admin Girişi</h2>
      <form id="adminLoginForm">
        <input type="password" id="adminSecret" placeholder="Admin Şifresi" required>
        <button type="submit" class="btn btn-primary btn-full">Giriş</button>
      </form>
      <div id="loginMsg"></div>
    </div>
  </main>

  <!-- Panel -->
  <main id="panelSection" style="display:none;max-width:1100px;width:100%;margin:0 auto;padding:24px 16px">
    <div class="admin-header">
      <h2 style="color:var(--navy)">🛡️ Admin Paneli</h2>
      <button class="btn btn-outline" onclick="adminLogout()">Çıkış</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="search-row">
      <input type="text" id="searchQ" placeholder="Kurum adı veya kodu ara...">
      <select id="filterStatus">
        <option value="">Tümü</option>
        <option value="active">Aktif</option>
        <option value="inactive">Pasif</option>
      </select>
      <button class="btn btn-primary" onclick="loadInstitutions(1)">Ara</button>
    </div>

    <div class="table-wrap responsive-table">
      <table class="inst-table m-card-table">
        <thead>
          <tr>
            <th>Kurum Adı</th>
            <th>Kod</th>
            <th>İl</th>
            <th>İlçe</th>
            <th>Durum</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="instBody"></tbody>
      </table>
    </div>
    <div id="noResults" class="msg msg-info" style="display:none">Sonuç bulunamadı.</div>
    <div class="pagination" id="pagination"></div>
  </main>

  <!-- Aktivasyon Modal -->
  <div class="modal-overlay" id="activateModal">
    <div class="modal">
      <h3>Kurum Aktif Et</h3>
      <p id="activateInstName" style="color:var(--gray);margin-bottom:12px"></p>
      <form id="activateForm">
        <input type="hidden" id="activateCode">
        <input type="password" id="activatePassword" placeholder="Kurum şifresi belirleyin" required minlength="6">
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">İptal</button>
          <button type="submit" class="btn btn-primary">Aktif Et</button>
        </div>
      </form>
      <div id="activateMsg"></div>
    </div>
  </div>

  <script src="layout.js"></script>
  <script>
    const API_URL = `https://${location.hostname}`;
    let adminToken = sessionStorage.getItem('adminToken') || '';
    let currentPage = 1;

    const headers = () => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${adminToken}`
    });

    // Oturum varsa paneli göster
    if (adminToken) { showPanel(); }

    document.getElementById('adminLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const secret = document.getElementById('adminSecret').value;
      try {
        const res = await fetch(`${API_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret })
        });
        const data = await res.json();
        if (res.ok) {
          adminToken = data.token;
          sessionStorage.setItem('adminToken', adminToken);
          showPanel();
        } else {
          document.getElementById('loginMsg').innerHTML = `<div class="msg msg-error">${data.error}</div>`;
        }
      } catch {
        document.getElementById('loginMsg').innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
    });

    function adminLogout() {
      sessionStorage.removeItem('adminToken');
      adminToken = '';
      location.reload();
    }

    // 401 gelirse oturumu sonlandır
    async function authFetch(url, opts = {}) {
      opts.headers = headers();
      const res = await fetch(url, opts);
      if (res.status === 401) { adminLogout(); return null; }
      return res;
    }

    async function showPanel() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('panelSection').style.display = 'block';
      await loadStats();
      await loadInstitutions(1);

      document.getElementById('searchQ').addEventListener('keydown', e => {
        if (e.key === 'Enter') loadInstitutions(1);
      });
      document.getElementById('filterStatus').addEventListener('change', () => loadInstitutions(1));
    }

    async function loadStats() {
      try {
        const [all, active, inactive] = await Promise.all([
          authFetch(`${API_URL}/admin/institutions?page=1&status=`).then(r => r?.json()),
          authFetch(`${API_URL}/admin/institutions?page=1&status=active`).then(r => r?.json()),
          authFetch(`${API_URL}/admin/institutions?page=1&status=inactive`).then(r => r?.json())
        ]);
        if (!all) return;
        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><div class="num">${all.total}</div><div class="label">Toplam Kurum</div></div>
          <div class="stat-card"><div class="num" style="color:var(--success)">${active.total}</div><div class="label">Aktif</div></div>
          <div class="stat-card"><div class="num" style="color:var(--error)">${inactive.total}</div><div class="label">Pasif</div></div>
        `;
      } catch {}
    }

    async function loadInstitutions(page) {
      currentPage = page;
      const q = document.getElementById('searchQ').value;
      const status = document.getElementById('filterStatus').value;
      const tbody = document.getElementById('instBody');
      const noRes = document.getElementById('noResults');

      try {
        const res = await authFetch(`${API_URL}/admin/institutions?q=${encodeURIComponent(q)}&status=${status}&page=${page}`);
        if (!res) return;
        const data = await res.json();

        if (!data.results.length) {
          tbody.innerHTML = '';
          noRes.style.display = 'block';
          document.getElementById('pagination').innerHTML = '';
          return;
        }
        noRes.style.display = 'none';

        tbody.innerHTML = data.results.map(i => `
          <tr>
            <td data-label="Kurum Adı">${i.name}</td>
            <td data-label="Kod"><code>${i.institution_code}</code></td>
            <td data-label="İl">${i.il_adi || '-'}</td>
            <td data-label="İlçe">${i.ilce_adi || '-'}</td>
            <td data-label="Durum"><span class="badge ${i.is_verified ? 'badge-active' : 'badge-inactive'}">${i.is_verified ? 'Aktif' : 'Pasif'}</span></td>
            <td data-label="İşlem">
              ${i.is_verified
                ? `<button class="action-btn btn-deactivate" onclick="deactivate('${i.institution_code}','${i.name.replace(/'/g,"\\'")}')">Deaktif Et</button>`
                : `<button class="action-btn btn-activate" onclick="openActivate('${i.institution_code}','${i.name.replace(/'/g,"\\'")}')">Aktif Et</button>`
              }
            </td>
          </tr>
        `).join('');

        // Pagination
        const pag = document.getElementById('pagination');
        pag.innerHTML = `
          <button class="btn btn-outline" ${page <= 1 ? 'disabled' : ''} onclick="loadInstitutions(${page - 1})">← Önceki</button>
          <span class="page-info">${page} / ${data.pages} (${data.total} kurum)</span>
          <button class="btn btn-outline" ${page >= data.pages ? 'disabled' : ''} onclick="loadInstitutions(${page + 1})">Sonraki →</button>
        `;
      } catch {
        tbody.innerHTML = '<tr><td colspan="6" class="msg msg-error">Yükleme hatası</td></tr>';
      }
    }

    function openActivate(code, name) {
      document.getElementById('activateCode').value = code;
      document.getElementById('activateInstName').textContent = `${name} (${code})`;
      document.getElementById('activatePassword').value = '';
      document.getElementById('activateMsg').innerHTML = '';
      document.getElementById('activateModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('activateModal').classList.remove('show');
    }

    document.getElementById('activateForm').addEventListener('submit', async e => {
      e.preventDefault();
      const code = document.getElementById('activateCode').value;
      const password = document.getElementById('activatePassword').value;
      const msg = document.getElementById('activateMsg');

      try {
        const res = await authFetch(`${API_URL}/admin/institution/activate`, {
          method: 'POST',
          body: JSON.stringify({ institutionCode: code, password })
        });
        const data = await res.json();
        if (res.ok) {
          closeModal();
          loadInstitutions(currentPage);
          loadStats();
        } else {
          msg.innerHTML = `<div class="msg msg-error">${data.error}</div>`;
        }
      } catch {
        msg.innerHTML = '<div class="msg msg-error">Bağlantı hatası</div>';
      }
    });

    async function deactivate(code, name) {
      if (!confirm(`${name} kurumunu deaktif etmek istediğinize emin misiniz?`)) return;
      try {
        const res = await authFetch(`${API_URL}/admin/institution/deactivate`, {
          method: 'POST',
          body: JSON.stringify({ institutionCode: code })
        });
        if (res.ok) {
          loadInstitutions(currentPage);
          loadStats();
        }
      } catch {}
    }
  </script>
</body>
</html>
